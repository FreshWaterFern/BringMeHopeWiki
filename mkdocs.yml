site_name: Bring Me Hope Wiki
site_description: The community wiki for Bring Me Hope. Items, levels, and more.
site_url: https://freshwaterfern.github.io/BringMeHopeWiki/

repo_url: https://github.com/FreshWaterFern/BringMeHopeWiki
repo_name: FreshWaterFern/BringMeHopeWiki
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js
  - javascripts/home-link.js

extra:
  social:
    - icon: fontawesome/brands/steam
      link: https://store.steampowered.com/app/1493290/Bring_Me_Hope/
      name: Bring Me Hope on Steam
    - icon: simple/itchdotio
      link: https://freshwaterfern.itch.io/bring-me-hope
      name: Bring Me Hope on itch.io
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@FreshWaterFern
      name: YouTube
    - icon: fontawesome/brands/twitch
      link: https://www.twitch.tv/freshwaterfern
      name: Twitch
    - icon: fontawesome/solid/globe
      link: https://www.fernmakesgames.com
      name: fernmakesgames.com
